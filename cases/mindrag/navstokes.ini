[backend]
precision = single
rank-allocator = linear

[backend-cuda]
device-id = local-rank

[constants]
gamma = 1.4
Pr = 0.71
mu = 8.19672e-8
rho_inf = 1.0
u_inf = 1.0
v_inf = 0.0
w_inf = 0.0
p_inf = 0.01094086

[solver]
system = navier-stokes
order = 3
shock-capturing = entropy-filter

[solver-time-integrator]
scheme = rk4
controller = none
tstart = 0.0
tend = 0.4
dt = 1e-5

[solver-entropy-filter]
d-min = 1e-6
p-min = 1e-6
e-tol = 1e-6
e-func = physical
niters = 2

[solver-interfaces]
riemann-solver = rusanov
ldg-beta = 0.5
ldg-tau = 0.1

[solver-interfaces-quad]
flux-pts = gauss-legendre

[solver-interfaces-tri]
flux-pts = williams-shunn
quad-pts = williams-shunn

[solver-elements-hex]
soln-pts = gauss-legendre

[solver-elements-pri]
soln-pts = williams-shunn~gauss-legendre
quad-pts = williams-shunn~gauss-legendre

[soln-bcs-wall]
type = no-slp-adia-wall

[soln-bcs-farfield]
type = sup-in-fa
rho = rho_inf
u = u_inf
v = v_inf
w = w_inf
p = p_inf

[soln-bcs-outflow]
type = sup-out-fn

[soln-ics]
rho = rho_inf
u = u_inf
v = v_inf
w = w_inf
p = p_inf

[soln-plugin-writer]
dt-out = 0.1
basedir = out/
basename = cone-{t:.2f}

[soln-plugin-nancheck]
nsteps = 1000

[soln-plugin-fluidforce-wall]
nsteps = 1000
file = force.csv
quad-deg = 3
