[backend]
precision = single
rank-allocator = linear

[backend-cuda]
device-id = local-rank

[constants]
gamma = 1.4
Re = 2.3e6
Pr = 0.71
mu = 4.34782609e-7
cpTref = 0.1
cpTs = 0.169846
rho_inf = 1.0
u_inf = 1.0
v_inf = 0.0
w_inf = 0.0
p_inf = 0.02857142857

[solver]
system = navier-stokes
order = 3
shock-capturing = entropy-filter
viscosity-correction = sutherland

[solver-time-integrator]
formulation = std
scheme = rk4
tstart = 0.0
tend = 5.0
dt = 8e-5
controller = none

[soln-filter]
nsteps = 10
alpha = 36.0
order = 2
cutoff = 1

[solver-entropy-filter]
d-min = 1e-6
p-min = 1e-6
e-tol = 1e-9
niters = 8

[solver-interfaces]
riemann-solver = hllc
ldg-beta = 0.5
ldg-tau = 0.1

[solver-interfaces-quad]
flux-pts = gauss-legendre

[solver-elements-hex]
soln-pts = gauss-legendre

[soln-bcs-farfield]
type = char-riem-inv
rho = rho_inf
u = u_inf
v = v_inf
w = w_inf
p = p_inf

[soln-bcs-wall]
type = no-slp-adia-wall

[soln-bcs-bottom-wall]
type = no-slp-adia-wall

[soln-bcs-outflow]
type = sup-out-fn

[soln-bcs-symplane]
type = slp-adia-wall

[soln-ics]
rho = rho_inf
u = u_inf
v = v_inf
w = w_inf
p = p_inf

[soln-plugin-nancheck]
nsteps = 1000

[soln-plugin-writer]
dt-out = 1.0
basedir = out
basename = sol-{t:.2f}

[soln-plugin-sampler]
nsteps = 125
samp-pts = [(0.30, 0.044182, 0.05), (0.55, 0.122053, 0.05), (0.70, 0.140100, 0.05)]
format = primitive
file = probes.csv
file-format = csv
file-header = true

[soln-plugin-tavg-domain]
nsteps = 125
dt-out = 1.0
tstart = 1.0
mode = continuous
std-mode = summary
basedir = out
basename = tavg-{t:.2f}
avg-rho = rho
avg-p = p
avg-u = u
avg-v = v
avg-w = w
avg-uu = u*u
avg-vv = v*v
avg-ww = w*w
fun-avg-tke = 0.5*(uu - u*u + vv - v*v + ww - w*w)
fun-avg-mach = sqrt(u*u + v*v + w*w) / sqrt(1.4 * p / rho)

[soln-plugin-tavg-massflow]
nsteps = 125
dt-out = 0.1
tstart = 0.0
mode = windowed
std-mode = all
basedir = out
basename = massflow-{t:.2f}
region = outflow
region-type = surface
avg-u = u
avg-rho = rho
fun-avg-mdot = rho * u

[soln-plugin-tavg-skinfric]
nsteps = 125
dt-out = 1.0
tstart = 1.0
mode = continuous
std-mode = summary
basedir = out
basename = skin-fric-{t:.2f}
avg-p = p
avg-rho = rho
avg-grad_u_x = grad_u_x
avg-grad_u_y = grad_u_y
avg-grad_v_x = grad_v_x
avg-grad_v_y = grad_v_y