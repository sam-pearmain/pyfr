[backend]
precision = double

[constants]
gamma = 1.4
mu = 6.25e-4
Pr = 0.71
p_0 = 0.45714285714285713

[solver]
system = navier-stokes
order = 4

[solver-time-integrator]
scheme = rk34
controller = none
tstart = 0
tend = 20
dt = 5e-4

[solver-interfaces]
riemann-solver = rusanov
ldg-beta = 0.5
ldg-tau = 0.1

[solver-interfaces-quad]
flux-pts = gauss-legendre

[solver-elements-hex]
soln-pts = gauss-legendre

[soln-plugin-integrate]
nsteps = 500
file = integral.csv
header = true
invvol = 1.0 / ((2.0 * pi)**3)
Tratio = p / (rho * 0.45714285714285713)
muratio = (1.4042*(%(Tratio)s)**1.5)/(%(Tratio)s + 0.4042)
vor1 = grad_w_y - grad_v_z
vor2 = grad_u_z - grad_w_x
vor3 = grad_v_x - grad_u_y
divU = grad_u_x + grad_v_y + grad_w_z

int-Ek = %(invvol)s*0.5*rho*(u*u + v*v + w*w)
int-eps_s = %(invvol)s*(1.0/1600.0)*%(muratio)s*(%(vor1)s*%(vor1)s + %(vor2)s*%(vor2)s + %(vor3)s*%(vor3)s)
int-eps_d = %(invvol)s*(4.0/4800.0)*%(muratio)s*(%(divU)s*%(divU)s)

[soln-plugin-writer]
dt-out = 1
basedir = .
basename = taylor-green-{t:.2f}

[soln-plugin-dtstats]
flushsteps = 1000
file = dtstats.csv
header = true

[soln-ics]
rho = 1 + (1.0 / (16.0 * p_0)) * (cos(2 * x) + cos(2 * y))*(cos(2 * z) + 2)
u = sin(x) * cos(y) * cos(z)
v = -cos(x) * sin(y) * cos(z)
w = 0
p = p_0 + (1.0 / 16.0) * (cos(2 * x) + cos(2 * y))*(cos(2 * z) + 2)
