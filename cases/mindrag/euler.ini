[backend]
precision = single
rank-allocator = linear

[backend-cuda]
device-id = local-rank

[constants]
gamma = 1.4
rho_inf = 1.0
u_inf = 1.0
v_inf = 0.0
w_inf = 0.0
p_inf = 0.013043931962850882

[solver]
system = euler
order = 3
shock-capturing = entropy-filter

[solver-time-integrator]
scheme = rk4
controller = none
tstart = 0.0
tend = 2.0
dt = 1e-4

[solver-entropy-filter]
d-min = 1e-6
p-min = 1e-6
e-tol = 1e-6
e-func = physical
niters = 2

[solver-interfaces]
riemann-solver = rusanov

[solver-interfaces-quad]
flux-pts = gauss-legendre

[solver-interfaces-tri]
flux-pts = williams-shunn
quad-pts = williams-shunn

[solver-elements-hex]
soln-pts = gauss-legendre

[solver-elements-pri]
soln-pts = williams-shunn~gauss-legendre
quad-pts = williams-shunn~gauss-legendre

[soln-bcs-wall]
type = slp-adia-wall

[soln-bcs-farfield]
type = sup-in-fa
rho = rho_inf
u = u_inf
v = v_inf
w = w_inf
p = p_inf

[soln-bcs-outflow]
type = sup-out-fn

[soln-ics]
rho = rho_inf
u = u_inf
v = v_inf
w = w_inf
p = p_inf

[soln-plugin-writer]
dt-out = 0.5
basedir = out/
basename = soln-{t:.2f}

[soln-plugin-nancheck]
nsteps = 500

[soln-plugin-fluidforce-wall]
nsteps = 1000
file = force.csv
quad-deg = 3
